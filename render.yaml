services:
  - type: web
    name: braindoc-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: VOYAGE_API_KEY
        sync: false
      - key: ALLOWED_ORIGIN
        sync: false
      - key: PYTHON_VERSION
        value: "3.12.7"
